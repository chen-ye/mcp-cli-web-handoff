<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Web Handoff</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header class="header">
    <h1>Web Handoff</h1>
    <div class="status-indicator">
      <div id="status-dot" class="status-dot"></div>
      <span id="status-text">Disconnected</span>
    </div>
  </header>

  <main class="content">
    <!-- CLI to Web Section -->
    <section class="section">
      <h2 class="section-label">Pending Prompt</h2>
      <div id="prompt-display" class="display-area"></div>
      <div class="btn-group">
        <button id="copy-prompt-btn" disabled>
          <span>Copy Prompt</span>
        </button>
        <button id="copy-project-path-btn" disabled>
          <span>Copy Project Path</span>
        </button>
        <button id="copy-context-btn" disabled>
          <span>Copy Context ZIP</span>
        </button>
      </div>
    </section>

    <!-- Web to CLI Section -->
    <section class="section">
      <h2 class="section-label">Return Response</h2>
      <textarea id="web-response" class="input-field" placeholder="Paste response from Gemini here..."></textarea>
      <button id="submit-response-btn" class="primary-btn" disabled>
        Submit to CLI
      </button>
    </section>
  </main>

  <footer class="footer">
    <h2 class="section-label">Security</h2>
    <div class="token-input-group">
      <input type="password" id="token-input" class="token-input" placeholder="Enter daemon token...">
      <button id="save-token-btn">Save</button>
    </div>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
